<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viragzo Piac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=block" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffffff 0%, #c1c3c5 100%);
            font-family: 'Bungee', sans-serif;
            overflow: hidden;
        }

        .loading-container {
            text-align: center;
        }

        .loading-text {
            font-size: 4rem;
            color: #111;
            margin-bottom: 30px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loading-dots {
            font-size: 2rem;
            color: #111;
            letter-spacing: 8px;
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        @keyframes dots {
            0%, 20% {
                content: '';
            }
            40% {
                content: '.';
            }
            60% {
                content: '..';
            }
            80%, 100% {
                content: '...';
            }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="loading-text">Loading</div>
        <div class="loading-dots">...</div>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = 'viragzo-piac.html';
        }, 2000);
    </script>
</body>
</html>
